services:
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./backend:/app
      - ./backend/opt/minecraft/server:/opt/minecraft/server
      - ./backend/opt/minecraft/backups:/opt/minecraft/backups
      - ./backend/opt/minecraft/uploads:/opt/minecraft/uploads
      - ./backend/opt/minecraft/quarantine:/opt/minecraft/quarantine
      - ./backend/opt/minecraft/mod_cache:/opt/minecraft/mod_cache
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload

  bot:
    build: ./backend
    env_file:
      - ./backend/.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./backend:/app
      - ./backend/opt/minecraft/server:/opt/minecraft/server
      - ./backend/opt/minecraft/backups:/opt/minecraft/backups
      - ./backend/opt/minecraft/uploads:/opt/minecraft/uploads
      - ./backend/opt/minecraft/quarantine:/opt/minecraft/quarantine
      - ./backend/opt/minecraft/mod_cache:/opt/minecraft/mod_cache
    command: python discord_bot.py
    restart: unless-stopped

  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: modserver
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d modserver"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:
