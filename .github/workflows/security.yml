name: Security Audit

on:
  schedule:
    # Every Monday at 9am UTC
    - cron: "0 9 * * 1"
  workflow_dispatch: # Allow manual trigger

permissions:
  issues: write
  contents: read

jobs:
  python-audit:
    name: Python Dependency Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Install project dependencies
        run: pip install -r requirements.txt

      - name: Run pip-audit
        id: audit
        run: |
          set +e
          OUTPUT=$(pip-audit --format=json 2>&1)
          EXIT_CODE=$?
          set -e

          echo "$OUTPUT" > /tmp/pip-audit.json
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT

          if [ $EXIT_CODE -ne 0 ]; then
            echo "::warning::pip-audit found vulnerabilities"
            # Pretty print for log
            pip-audit 2>&1 || true
          else
            echo "No known vulnerabilities found in Python dependencies"
          fi

      - name: Upload audit results
        if: steps.audit.outputs.exit_code != '0'
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-results
          path: /tmp/pip-audit.json

  node-audit:
    name: Node Dependency Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        id: audit
        run: |
          set +e
          npm audit --json > /tmp/npm-audit.json 2>&1
          EXIT_CODE=$?
          set -e

          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT

          if [ $EXIT_CODE -ne 0 ]; then
            echo "::warning::npm audit found vulnerabilities"
            npm audit 2>&1 || true
          else
            echo "No known vulnerabilities found in Node dependencies"
          fi

      - name: Upload audit results
        if: steps.audit.outputs.exit_code != '0'
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-results
          path: /tmp/npm-audit.json

  create-issue:
    name: Create Issue if Vulnerabilities Found
    runs-on: ubuntu-latest
    needs: [python-audit, node-audit]
    if: |
      always() &&
      (needs.python-audit.outputs.exit_code != '0' || needs.node-audit.outputs.exit_code != '0')

    steps:
      - uses: actions/checkout@v4

      - name: Check for existing issue
        id: existing
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ISSUE=$(gh issue list \
            --label "security" \
            --state open \
            --search "Weekly Security Audit" \
            --json number \
            --jq '.[0].number // empty')

          echo "issue=${ISSUE}" >> $GITHUB_OUTPUT

      - name: Create or update issue
        if: steps.existing.outputs.issue == ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue create \
            --title "Weekly Security Audit — $(date -u '+%Y-%m-%d')" \
            --label "security" \
            --body "$(cat <<'EOF'
          ## Security Audit Results

          The weekly dependency audit found potential vulnerabilities.

          Check the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details and download the audit artifacts.

          ### Next Steps
          1. Review the audit results
          2. Update vulnerable dependencies
          3. Close this issue when resolved

          ---
          *Auto-created by the security audit workflow.*
          EOF
          )"
