[tool.ruff]
target-version = "py312"
line-length = 120

[tool.ruff.lint]
select = [
    "E",     # pycodestyle errors
    "W",     # pycodestyle warnings
    "F",     # pyflakes
    "I",     # isort
    "UP",    # pyupgrade
    "B",     # flake8-bugbear
    "SIM",   # flake8-simplify
    "RUF",   # ruff-specific rules
]
ignore = [
    "E501",   # line too long (handled by formatter)
    "B008",   # do not perform function call in argument defaults (FastAPI Depends)
    "B905",   # zip strict (python 3.10+)
    "SIM108", # ternary operator (readability preference)
    "RUF012", # mutable class variables (SQLAlchemy models)
    "UP007",  # use X | Y for union (some places need Optional for clarity)
]

[tool.ruff.lint.isort]
known-first-party = ["api", "bot", "core", "models"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
